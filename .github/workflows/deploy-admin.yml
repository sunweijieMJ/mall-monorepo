# Admin 构建与部署工作流
# 构建 Docker 镜像，打包后通过 SSH 部署到服务器
#
# 触发条件:
#   1. 推送 tag (admin-v*.*.*)  - 自动部署
#   2. 手动触发                  - 可选择是否执行部署
#
# 配置步骤:
#   在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中添加:
#     - ADMIN_VITE_BASEURL:      API 接口基础地址
#     - DEPLOY_SERVER_HOST:      服务器 IP 或域名
#     - DEPLOY_SERVER_USER:      SSH 用户名
#     - DEPLOY_SERVER_PATH:      部署目标路径 (如 /opt/deploy/mall-admin)
#     - DEPLOY_SSH_PRIVATE_KEY:  SSH 私钥 (完整内容，包括 BEGIN/END 行)

name: Deploy Admin

on:
  push:
    branches: [main, master, 'release/**']
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - 'internal/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  workflow_dispatch:
    inputs:
      deploy:
        description: '是否部署到服务器'
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_IMAGE: 'nginx:alpine'
  REGISTRY_LOCAL: 'docker-local'
  REPO_PREFIX: 'mall-admin/web'
  IMAGE_PREFIX: 'mall-admin-web'
  PACKAGE_PREFIX: 'mall-admin-web'
  APP_DIR: 'apps/admin'

jobs:
  # ==================== 代码质量检查 ====================
  check:
    name: Check
    uses: ./.github/workflows/check-admin.yml

  # ==================== 构建静态资源 ====================
  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate build info
        id: info
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          GIT_BRANCH="${GITHUB_REF_NAME}"
          BUILD_TIME=$(date "+%Y-%m-%d_%H-%M-%S")
          IMAGE_NAME="${{ env.REGISTRY_LOCAL }}/${{ env.REPO_PREFIX }}:${GIT_HASH}"

          cat > ${{ env.APP_DIR }}/node_build_info.sh << EOF
          hash=${GIT_HASH}
          build_at=${BUILD_TIME}
          branch=${GIT_BRANCH}
          website_docker_name=${IMAGE_NAME}
          EOF

          cp ${{ env.APP_DIR }}/node_build_info.sh ${{ env.APP_DIR }}/version.html
          perl -p -i -e 's/\n/<br>/g' ${{ env.APP_DIR }}/version.html

          echo "git_hash=${GIT_HASH}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: ${{ env.APP_DIR }}
        run: pnpm build
        env:
          VITE_BASEURL: ${{ secrets.ADMIN_VITE_BASEURL }}
          NODE_OPTIONS: --max-old-space-size=16384

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-build-output
          path: |
            ${{ env.APP_DIR }}/dist/
            ${{ env.APP_DIR }}/version.html
            ${{ env.APP_DIR }}/node_build_info.sh
            ${{ env.APP_DIR }}/Dockerfile
            ${{ env.APP_DIR }}/deploy/
          retention-days: 7

  # ==================== 打包 Docker 镜像 ====================
  package:
    name: Package Docker Image
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: admin-build-output

      - name: Build Docker image & create deploy package
        run: |
          source node_build_info.sh
          IMAGE_TAG_NAME="${{ env.IMAGE_PREFIX }}:${hash}"
          PACKAGE_NAME="${{ env.PACKAGE_PREFIX }}_${hash}_$(date '+%Y-%m-%d_%H-%M-%S').tar.gz"

          # 构建 Docker 镜像
          docker build -f Dockerfile -t "${website_docker_name}" \
            --build-arg BASE_IMAGE="${{ env.BASE_IMAGE }}" .

          # 准备部署目录
          mkdir -p mall_admin_web
          cp -r deploy/* mall_admin_web/

          # 保存 Docker 镜像
          docker tag "${website_docker_name}" "${IMAGE_TAG_NAME}"
          docker save "${IMAGE_TAG_NAME}" -o "mall_admin_web/${IMAGE_TAG_NAME//:/\_}.tar"

          # 更新构建信息（追加 MD5）
          echo "web_docker_md5=$(md5sum mall_admin_web/${IMAGE_TAG_NAME//:/\_}.tar | awk '{print $1}')" >> node_build_info.sh
          cp node_build_info.sh mall_admin_web/

          # 打包为最终部署包
          tar -czf "${PACKAGE_NAME}" mall_admin_web
          echo "Deploy package created: ${PACKAGE_NAME}"

      - name: Upload deploy package
        uses: actions/upload-artifact@v4
        with:
          name: admin-deploy-package
          path: |
            *.tar.gz
            node_build_info.sh
          retention-days: 30

  # ==================== 部署到服务器 ====================
  deploy:
    name: Deploy to Server
    needs: package
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true') ||
      github.event_name == 'push'
    concurrency:
      group: deploy-admin-production
      cancel-in-progress: false
    environment:
      name: admin-production

    steps:
      - name: Check secrets
        run: |
          has_error=0
          [[ -z "${{ secrets.DEPLOY_SERVER_HOST }}" ]]     && echo "::error::缺少 DEPLOY_SERVER_HOST"     && has_error=1
          [[ -z "${{ secrets.DEPLOY_SERVER_USER }}" ]]     && echo "::error::缺少 DEPLOY_SERVER_USER"     && has_error=1
          [[ -z "${{ secrets.DEPLOY_SERVER_PATH }}" ]]     && echo "::error::缺少 DEPLOY_SERVER_PATH"     && has_error=1
          [[ -z "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]] && echo "::error::缺少 DEPLOY_SSH_PRIVATE_KEY" && has_error=1
          [[ $has_error -eq 1 ]] && echo "请在 Settings -> Secrets 中配置以上变量" && exit 1
          echo "Secrets 配置正确"

      - name: Download deploy package
        uses: actions/download-artifact@v4
        with:
          name: admin-deploy-package

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_SERVER_PATH }}
        run: |
          source node_build_info.sh
          PACKAGE_FILE=$(ls ${{ env.PACKAGE_PREFIX }}_${hash}_*.tar.gz | head -1)
          IMAGE_TAG_NAME="${{ env.IMAGE_PREFIX }}:${hash}"

          echo "=========================================="
          echo "部署信息:"
          echo "  分支/Tag: ${GITHUB_REF_NAME}"
          echo "  服务器: ${DEPLOY_USER}@${DEPLOY_HOST}"
          echo "  路径: ${DEPLOY_PATH}"
          echo "  部署包: ${PACKAGE_FILE}"
          echo "  Git Hash: ${hash}"
          echo "  构建时间: ${build_at}"
          echo "=========================================="

          # 确保目标目录存在
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p ${DEPLOY_PATH}"

          # 上传部署包
          scp -i ~/.ssh/deploy_key "${PACKAGE_FILE}" "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

          # 在服务器上执行部署
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" << EOF
            set -e
            cd ${DEPLOY_PATH}

            echo "解压部署包..."
            tar -xzf $(basename ${PACKAGE_FILE})
            cd mall_admin_web

            echo "加载 Docker 镜像..."
            docker load -i "${IMAGE_TAG_NAME//:/\_}.tar"

            echo "重启容器..."
            ./manage.sh stop || true
            ./manage.sh remove || true
            ./manage.sh start

            echo "容器状态:"
            ./manage.sh status

            echo "清理旧部署包（保留最近 3 个）..."
            cd ${DEPLOY_PATH}
            ls -t ${{ env.PACKAGE_PREFIX }}_*.tar.gz | tail -n +4 | xargs -r rm -f

            echo "清理旧 Docker 镜像（保留最近 3 个）..."
            docker images "${{ env.IMAGE_PREFIX }}" -q | tail -n +4 | xargs -r docker rmi 2>/dev/null || true

            echo "=========================================="
            echo "部署成功！"
            echo "=========================================="
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ==================== 汇总通知 ====================
  notify:
    name: Notify
    needs: [build, package, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summary
        run: |
          {
            echo "# Admin 部署结果"
            echo ""
            echo "| 阶段 | 状态 |"
            echo "|------|------|"
            echo "| 构建 | ${{ needs.build.result }} |"
            echo "| 打包 | ${{ needs.package.result }} |"
            echo "| 部署 | ${{ needs.deploy.result || 'skipped' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**服务器**: ${{ secrets.DEPLOY_SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          fi
