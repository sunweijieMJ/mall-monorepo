# Server 构建与部署工作流
# 构建 Docker 镜像并推送至 GHCR，通过 SSH 部署到阿里云 ECS
#
# 触发条件:
#   1. push 到 main / master / release/**（server 相关路径变更时）
#   2. 手动触发 (workflow_dispatch) - 可选择是否执行部署
#
# 配置步骤（GitHub Secrets）:
#   在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中添加:
#   DEPLOY_HOST        - 服务器 IP 或域名
#   DEPLOY_PORT        - SSH 端口（可选，默认 22）
#   DEPLOY_USER        - SSH 用户名
#   DEPLOY_SSH_KEY     - SSH 私钥（完整内容，包括 BEGIN/END 行）
#   SERVER_DEPLOY_PATH - 部署目标路径（如 /home/deploy/mall-server）

name: Deploy Server

on:
  push:
    branches: [main, master, 'release/**']
    paths:
      - 'apps/server/**'
      - 'internal/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  workflow_dispatch:
    inputs:
      deploy:
        description: '是否部署到服务器'
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mall-server

jobs:
  # ==================== 代码质量检查 ====================
  check:
    name: Check
    uses: ./.github/workflows/check-server.yml

  # ==================== 构建并推送镜像 ====================
  build-and-push:
    name: Build and Push
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      git_hash: ${{ steps.info.outputs.git_hash }}
      build_time: ${{ steps.info.outputs.build_time }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate build info
        id: info
        run: |
          echo "git_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        id: repo
        run: echo "image_name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.image_name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          platforms: linux/amd64
          target: production
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 部署到阿里云 ECS ====================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    permissions:
      packages: read
    concurrency:
      group: deploy-server-production
      cancel-in-progress: false
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Check deploy secrets
        run: |
          has_error=0
          [[ -z "${{ secrets.DEPLOY_HOST }}" ]]        && echo "::error::缺少 DEPLOY_HOST"        && has_error=1
          [[ -z "${{ secrets.DEPLOY_USER }}" ]]        && echo "::error::缺少 DEPLOY_USER"        && has_error=1
          [[ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]]     && echo "::error::缺少 DEPLOY_SSH_KEY"     && has_error=1
          [[ -z "${{ secrets.SERVER_DEPLOY_PATH }}" ]] && echo "::error::缺少 SERVER_DEPLOY_PATH" && has_error=1
          [ $has_error -eq 1 ] && exit 1 || echo "Secrets 配置检查通过"

      - name: Sync deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: 'apps/server/deploy/docker-compose.prod.yaml,apps/server/deploy/manage.sh'
          target: ${{ secrets.SERVER_DEPLOY_PATH }}
          strip_components: 2

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_FULL_NAME: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.git_hash }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          envs: DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN,IMAGE_FULL_NAME
          script: |
            set -e
            cd "$DEPLOY_PATH"
            chmod +x deploy/manage.sh

            echo "Logging in to GHCR..."
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            IMAGE_FULL_NAME="${IMAGE_FULL_NAME,,}"
            echo "Pulling image: ${IMAGE_FULL_NAME}..."

            retry=0
            until docker pull "${IMAGE_FULL_NAME}" || [ $retry -eq 3 ]; do
              retry=$((retry + 1))
              echo "Retry $retry/3..."
              sleep 10
            done
            [ $retry -eq 3 ] && { echo "Failed to pull image"; exit 1; }

            export IMAGE_FULL_NAME
            echo "Restarting services..."
            docker compose -f deploy/docker-compose.prod.yaml up -d --remove-orphans

            # 清理旧镜像（保留最新 3 个）
            IMAGE_REPO="${IMAGE_FULL_NAME%:*}"
            docker images "${IMAGE_REPO}" -q | tail -n +4 | xargs -r docker rmi -f || true

            echo "Deployment completed! Image: ${IMAGE_FULL_NAME}"

  # ==================== 部署结果汇总 ====================
  notify:
    name: Summary
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Deployment summary
        run: |
          {
            echo "# 部署结果"
            echo ""
            echo "| 阶段 | 状态 |"
            echo "|------|------|"
            echo "| 构建推送 | ${{ needs.build-and-push.result }} |"
            echo "| 部署 | ${{ needs.deploy.result || 'skipped' }} |"
            echo ""
            echo "**Git Hash**: \`${{ needs.build-and-push.outputs.git_hash }}\`"
            echo "**构建时间**: ${{ needs.build-and-push.outputs.build_time }}"
          } >> "$GITHUB_STEP_SUMMARY"
