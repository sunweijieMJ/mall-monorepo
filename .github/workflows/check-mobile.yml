# Mobile 代码质量检查
# 职责: lint、type-check、test (turbo --filter=mall-app-web)
#
# 触发条件:
#   1. PR/push 到 main / master / release/**（mobile 或共享包路径变更时）
#   2. 手动触发 (workflow_dispatch)
#   3. 被其他工作流调用 (workflow_call)

name: Check Mobile

on:
  push:
    branches: [main, master, 'release/**']
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'internal/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/check-mobile.yml'
  pull_request:
    branches: [main, master, 'release/**']
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'internal/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/check-mobile.yml'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: check-mobile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Type Check & Test (mobile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint --filter=mall-app-web

      - name: Type Check
        run: pnpm turbo type-check --filter=mall-app-web

      - name: Test
        run: pnpm turbo test --filter=mall-app-web
        continue-on-error: true
