name: Bug 报告
description: 提交一个 Bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量详细描述问题，以便我们快速定位和修复。

  - type: dropdown
    id: app
    attributes:
      label: 涉及应用
      options:
        - Admin 后台
        - Mobile 移动端
        - 两者都有
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 打开 '...'
        2. 点击 '...'
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？

  - type: input
    id: node-version
    attributes:
      label: Node.js 版本
      placeholder: 例如 22.x

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 如有错误日志或控制台输出，请粘贴在此
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如有相关截图，请在此上传
